name : ci 
on: 
  push:
    branches: [ main] 
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      - name: setup node.js
          uses: actions/setup-node@v6
          with:
            node-version: 24
            cache: 'npm'
